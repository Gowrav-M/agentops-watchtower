name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Demo
        run: node dist/cli.js demo

      - name: Policy scan
        run: node dist/cli.js scan-mcp examples/mcp/safe-tools.json --fail-on high --sarif

      - name: MCP baseline
        run: node dist/cli.js baseline-mcp examples/mcp/safe-tools.json

      - name: MCP baseline diff
        run: node dist/cli.js diff-mcp examples/mcp/safe-tools.json --fail-on high

      - name: MCP inventory
        run: node dist/cli.js inventory-mcp examples/mcp/safe-client-config.json --fail-on high --sarif

      - name: AgentBOM
        run: node dist/cli.js agent-bom --config examples/mcp/safe-client-config.json --descriptor examples/mcp/safe-tools.json --fail-on high --cyclonedx

      - name: MCP admission
        run: node dist/cli.js admit-mcp --descriptor examples/mcp/safe-tools.json --config examples/mcp/safe-client-config.json --fail-on high --sarif

      - name: MCP gate
        run: node dist/cli.js gate-mcp --config examples/mcp/safe-client-config.json --server safe-docs --descriptor examples/mcp/safe-tools.json --fail-on high --sarif

      - name: Runtime attack graph
        run: node dist/cli.js analyze-run --trace examples/traces/codex-session.jsonl --fail-on high --sarif

      - name: Evidence bundle
        run: node dist/cli.js attest-mcp --subject safe-docs && node dist/cli.js verify-attestation

      - name: OTel export
        run: node dist/cli.js export-otel
