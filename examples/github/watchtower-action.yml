name: AgentOps Watchtower

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  watchtower:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Watchtower
        uses: Gowrav-M/agentops-watchtower@v1
        with:
          descriptor: examples/mcp/safe-tools.json
          config: examples/mcp/safe-client-config.json
          fail-on: high
          run-agent-bom: "true"
          run-admission: "true"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .watchtower/reports/watchtower.sarif
          category: agentops-watchtower
