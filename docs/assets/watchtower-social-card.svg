  <rect x="888" y="242" width="236" height="74" rx="18" fill="#0F172A" stroke="#334155"/>
  <text x="924" y="290" fill="#E5E7EB" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">npx ... check</text>
  <rect x="888" y="346" width="236" height="74" rx="18" fill="#0F172A" stroke="#334155"/>
  <text x="924" y="394" fill="#E5E7EB" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">npx ... protect</text>
